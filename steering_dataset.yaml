# Activation Steering Configuration Dataset v3.0
# Per-category dataset with configurable presets for activation steering experiments

metadata:
  version: "3.0"
  description: "Per-category activation steering with full data capture"
  model: "mistralai/Ministral-8B-Instruct-2410"

# Global run mode: "quick" or "full"
mode: "quick"

# Preset definitions
#
# QUICK (~15-20 min): Fast exploration of model characteristics
#   - Tests ALL layers to find which respond to steering
#   - Relaxed thresholds to quickly identify candidates
#   - Minimal inferences per test for speed
#   - Use results to inform full analysis
#
# FULL (~60-90 min): Comprehensive analysis for production
#   - Fine-grained strength testing
#   - Strict thresholds for reliable steering
#   - More test prompts for statistical confidence
#
presets:
  quick:
    stability:
      layers: "all"                              # Test ALL layers for quick overview
      strengths: [-3,-1.5, 1.5,3]                # Sparse: negative and positive extremes
      test_prompts: 1                            # Minimal: 1 harmless prompt added
      harmful_prompts: 2                         # NEW: Use only 2 of 6 harmful prompts (57% fewer inferences)
      coherence_threshold: 0.6                   # Relaxed: accept more layers as coherent
      min_range_width: 1.0                       # Relaxed: lower bar for "stable" layer
      middle_layer: "auto"                       # "auto" = num_layers//2
    condition:
      threshold_range: [0.0, 0.15]               # NARROWER: fewer threshold tests
      threshold_step: 0.03                       # COARSER: 33% fewer steps
      layer_range: [8, 30]                       # NARROWER: skip edge layers (37% fewer layers)
    training:
      max_layers: 4                              # Keep: use top 4 stable layers
      blend_ratio: 0.7                           # Keep: standard blend ratio
    range_optimization:
      forward_strengths: [1.5,3]                 # Keep: 2 forward strengths
      reverse_strengths: [-1.5,-3]               # Keep: 2 reverse strengths
      reverse_test_prompts: 1                    # REDUCED: 50% fewer reverse tests
      accuracy_threshold: 0.6                    # Relaxed: accept lower accuracy
      min_optimal_forward: 0.5                   # Keep: floor for optimal calculation
    generation:
      max_new_tokens_stability: 25               # REDUCED: 37% faster per inference
      max_new_tokens_test: 35                    # REDUCED: faster testing
    output:
      save_responses: true                       # Keep: save all responses
      save_all_searches: true                    # Keep: save search data

  full:
    stability:
      layers: "all"                              # Test ALL layers comprehensively
      strengths: [-2.0, -1.5, -1.0, -0.5, 0.0, 0.5, 1.0, 1.5, 2.0]  # Fine-grained
      test_prompts: 4                            # More prompts for confidence
      coherence_threshold: 0.8                   # Strict: require high coherence
      min_range_width: 1.5                       # Strict: require wider stable range
      middle_layer: "auto"
    condition:
      threshold_range: [0.0, 0.15]               # Focused search range
      threshold_step: 0.005                      # Fine-grained steps
      layer_range: [1, 36]                       # Full layer range
    training:
      max_layers: 6                              # More layers for stronger steering
      blend_ratio: 0.7
    range_optimization:
      forward_strengths: [0.25, 0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0]  # Fine-grained
      reverse_strengths: [-0.5, -0.75, -1.0, -1.25, -1.5, -1.75, -2.0]
      reverse_test_prompts: 6                    # More prompts for confidence
      accuracy_threshold: 0.75                   # Strict accuracy requirement
      min_optimal_forward: 0.5
    generation:
      max_new_tokens_stability: 60               # Standard response length
      max_new_tokens_test: 100                   # Longer for thorough testing
    output:
      save_responses: true                       # Save all responses for analysis
      save_all_searches: true

# Per-category overrides (optional - inherits from preset if not specified)
categories:
  violence: {}
  cybercrime: {}
  fraud: {}
  drugs: {}
  hate: {}
